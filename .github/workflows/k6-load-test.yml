name: K6 Load Test + HTML Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Test (Export JSON)
        run: |
          k6 run tests/hotstone-load.js \
          --env BASE_URL=${{ secrets.BASE_URL }} \
          --env EMAIL=${{ secrets.EMAIL }} \
          --env PASSWORD=${{ secrets.PASSWORD }} \
          --out json=report.json

      - name: Install k6 HTML Reporter
        run: npm install -g k6-reporter

      - name: Generate HTML Report
        run: |
          k6-reporter report.json --output report.html

      - name: Upload HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-html-report
          path: report.html
