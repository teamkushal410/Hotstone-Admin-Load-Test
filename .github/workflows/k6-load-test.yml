name: Load Test Hotstone Admin

on:
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      EMAIL1: ${{ secrets.EMAIL1 }}
      PASSWORD1: ${{ secrets.PASSWORD1 }}
      EMAIL2: ${{ secrets.EMAIL2 }}
      PASSWORD2: ${{ secrets.PASSWORD2 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Load Test
        run: |
          mkdir -p results
          k6 run tests/hotstone-load.js --out json=results/report.json

      - name: Install k6 HTML Reporter
        run: npm install -g k6-reporter

      - name: Generate HTML Report
        run: k6-reporter report.json --output report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: k6-html-report
          path: report.html
